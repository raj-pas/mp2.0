name: Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mp20
          POSTGRES_USER: mp20
          POSTGRES_PASSWORD: mp20
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mp20 -d mp20"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://mp20:mp20@localhost:5432/mp20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v5
      - name: Configure secure local E2E env
        run: |
          mkdir -p "$RUNNER_TEMP/mp20-secure-data"
          cat > .env <<EOF
          MP20_SECURE_DATA_ROOT=$RUNNER_TEMP/mp20-secure-data
          MP20_LOCAL_ADMIN_EMAIL=advisor@example.com
          MP20_LOCAL_ADMIN_PASSWORD=change-this-local-password
          MP20_LOCAL_ANALYST_EMAIL=analyst@example.com
          MP20_LOCAL_ANALYST_PASSWORD=change-this-local-password
          MP20_ENGINE_ENABLED=true
          EOF
      - name: Start Docker Compose stack
        run: docker compose up -d --build
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: Run synthetic browser E2E
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          MP20_LOCAL_ADMIN_EMAIL: advisor@example.com
          MP20_LOCAL_ADMIN_PASSWORD: change-this-local-password
          MP20_LOCAL_ANALYST_EMAIL: analyst@example.com
          MP20_LOCAL_ANALYST_PASSWORD: change-this-local-password
        run: npm run e2e:synthetic
      - name: Docker Compose logs
        if: failure()
        run: docker compose logs --no-color
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v
